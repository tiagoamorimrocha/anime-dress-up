<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <title>Dress Up!</title>

  <!-- Cache-busting: the standalone iOS home-screen app stays suspended
       between opens instead of re-fetching this page, so a new deploy
       otherwise never shows up. version.json is bumped by
       tools/bump_version.py on every deploy; when it changes we force a
       fresh reload (cache-busted URL, so it can't be served from cache). -->
  <script>
    (function () {
      var KEY = "dressup-app-version";
      function checkVersion() {
        fetch("version.json?_=" + Date.now(), { cache: "no-store" })
          .then(function (r) { return r.json(); })
          .then(function (data) {
            var seen = localStorage.getItem(KEY);
            if (seen && seen !== data.version) {
              localStorage.setItem(KEY, data.version);
              location.replace(location.pathname + "?_=" + Date.now());
            } else if (!seen) {
              localStorage.setItem(KEY, data.version);
            }
          })
          .catch(function () {});
      }
      checkVersion();
      document.addEventListener("visibilitychange", function () {
        if (!document.hidden) checkVersion();
      });
    })();
  </script>

  <!-- iOS full-screen web app -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Dress Up!" />
  <meta name="theme-color" content="#ffd6e0" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <link rel="manifest" href="manifest.json" />

  <link rel="stylesheet" href="styles.css?v=2026-07-08-220742" />
</head>
<body>
  <div id="app-frame">
    <header>
      <h1>✨ Dress Up! ✨</h1>
      <div class="actions">
        <a class="mode-link" href="anime.html" title="Anime mode">🎨</a>
        <button id="btn-random" title="Random outfit">🎲</button>
        <button id="btn-reset" title="Start over">↺</button>
      </div>
    </header>

    <nav id="tabs"></nav>

    <main>
      <div id="items"></div>

      <section id="stage">
        <svg id="doll" viewBox="0 0 300 600" xmlns="http://www.w3.org/2000/svg"></svg>
      </section>
    </main>
  </div>

  <script src="app.js?v=2026-07-08-220742"></script>
</body>
</html>
